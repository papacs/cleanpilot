name: CI

on:
  push:
  pull_request:

jobs:
  powershell:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate cleanup script
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\tests\Test-SafeDiskCleanup.ps1
